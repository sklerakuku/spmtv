<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата SPWorlds</title>
    <style>
        body { font-family: sans-serif; background: #2c2f33; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #23272a; padding: 30px; border-radius: 12px; width: 320px; text-align: center; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-discord { background: #5865f2; color: white; }
        .btn-pay { background: #43b581; color: white; display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #40444b; color: white; box-sizing: border-box; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Оплата АР</h2>
    <div id="status">Нужна авторизация</div>
    
    <a href="/api/auth/login" id="loginBtn" class="btn btn-discord">Войти через Discord</a>
    
    <div id="userBlock" style="display:none">
        <p>Привет, <strong id="userName"></strong>!</p>
        <input type="number" id="amount" placeholder="Сумма в АР">
        <button onclick="startPay()" class="btn btn-pay" id="payBtn">Оплатить</button>
    </div>
</div>

<script>
    // Проверяем параметры в URL после логина
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const userNick = urlParams.get('nick');

    if (userId && userNick) {
        document.getElementById('status').style.display = 'none';
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userBlock').style.display = 'block';
        document.getElementById('userName').innerText = userNick;
        document.getElementById('amount').style.display = 'block';
        document.getElementById('payBtn').style.display = 'block';
    }

    async function startPay() {
        const amount = document.getElementById('amount').value;
        const res = await fetch('/api/create-pay', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ amount, discordId: userId })
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
    }
</script>

</body>
</html>

<script>
    async function startPay() {
    const amount = document.getElementById('amount').value;
    const payBtn = document.getElementById('payBtn');
    
    // Блокируем кнопку на время запроса
    payBtn.disabled = true;
    payBtn.textContent = 'Создание платежа...';
    
    try {
        const res = await fetch('/api/create-pay', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ amount, discordId: userId })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
            throw new Error(data.details || 'Ошибка создания платежа');
        }
        
        if (data.url) {
            window.location.href = data.url;
        } else {
            throw new Error('Не получен URL для оплаты');
        }
    } catch (error) {
        alert('Ошибка: ' + error.message);
        payBtn.disabled = false;
        payBtn.textContent = 'Оплатить';
    }
}
</script>
