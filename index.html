<!DOCTYPE html>
<html>
<head>
    <title>Оплата АР</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #5865F2; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <input type="text" id="discordId" placeholder="Введите Discord ID">
        <button onclick="checkUser()">Найти ник</button>
        <p id="nickDisplay"></p>
        
        <div id="paySection" style="display:none">
            <input type="number" id="amount" placeholder="Сумма в АР">
            <button onclick="pay()" style="background: #2ecc71;">Оплатить</button>
        </div>
    </div>

    <script>
        async function checkUser() {
            const id = document.getElementById('discordId').value;
            const res = await fetch(`/api/get-user?id=${id}`);
            const data = await res.json();
            if (data.username) {
                document.getElementById('nickDisplay').innerText = "Ник: " + data.username;
                document.getElementById('paySection').style.display = "block";
            } else {
                alert("Пользователь не найден");
            }
        }

        async function pay() {
            const amount = document.getElementById('amount').value;
            const discordId = document.getElementById('discordId').value;
            const res = await fetch('/api/create-pay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount, discordId })
            });
            const data = await res.json();
            window.location.href = data.url; // Уходим на оплату
        }
    </script>
</body>
</html>
